<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f172a;
        }
        .card{
            width: 320px;
            padding: 35px 25px;
            background: #111827;
            border-radius: 25px;
            text-align: center;
            color: white;
            box-shadow: 0 0 30px rgba(0,0,0,0.4);
            animation: popup 0.6s ease;
        }
        .success-circle{
            width: 90px;
            height: 90px;
            margin: auto;
            border-radius: 50%;
            background: #22c55e;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: pulse 1.5s infinite;
        }
        .check{
            font-size: 45px;
            color: white;
        }
        h1{
            margin-top: 22px;
            font-size: 28px;
        }
        p{
            margin-top: 10px;
            color: #9ca3af;
            line-height: 25px;
            font-size: 15px;
        }
        .amount{
            margin-top: 22px;
            font-weight: bold;
            font-size: 38px;
            color: #22c55e;
        }
        button{
            margin-top: 28px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #22c55e;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        
    </style>
  </head>
  <body>
    <div class="card">
      <div class="success-circle">
        <div class="check">✓</div>
      </div>
      <h1>Payment Successfull</h1>
      <p>Your payment has been completed successfully</p>
      <div class="amount">1499</div>
      <button>Download Receipt</button>
    </div>
  </body>
</html>
