<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Metro Gate Animation</title>
   <style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }
    body{
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg,#050816,#111827);
        overflow: hidden;
    }
    .conatiner{
        text-align: center;
    }
    .card{
        width: 140px;
        height: 85px;
        border-radius: 15px;
        background: linear-gradient(135deg,00d4ff,#0066ff);
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 20px;
        font-weight: bold;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        top: 50%;
        animation: tap 2s forwards;
        box-shadow: 0 0 30px rgba(0,212,255,.5);
    }
    @keyframes tap{
        0%{
            top: 50px;
        }
        100%{
            top: 220px;
        }
    }
    .scanner{
        width: 180px;
        height: 180px;
        border-radius: 50%;
        border: 5px solid #00d4ff;
        margin: auto;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 70px;
        color: #00d4ff;
        box-shadow: 0 0 20px #00d4ff,inset 0 0 20px rgba(0,212,255,.4);

    }
    .status{
        margin-top: 30px;
        color: white;
        font-size: 28px;
        letter-spacing: 2px;
    }
    .gate{
        margin-top: 70px;
        display: flex;
        justify-content: center;
        gap: 15px;
    }
    .door{
        width: 30px;
        height: 150px;
        background: #00d4ff;
        border-radius: 10px;
        transition: 1.5s;
        box-shadow: 0 0 20px #00d4ff;
    }
    .open-left{
        transform: translateX(-90px);
    }
    .open-right{
        transform: translateX(90px);
    }
    .success{
        margin-top: 30px;
        font-size: 35px;
        color: #00ff88;
        opacity: 0;
        transform: translateY(20px);
        transition: 1s;
    }
    .show{
        opacity: 1;
        transform: translateY(0);
    }

   </style>
  </head>

  <body>
    <div class="container">
      <div class="card">METRO PASS</div>

      <div class="scanner" id="scanner">📶</div>

      <div class="status" id="status">TAP YOUR CARD</div>

      <div class="gate">
        <div class="door" id="leftDoor"></div>
        <div class="door" id="rightDoor"></div>
      </div>

      <div class="success" id="success">ACCESS GRANTED ✓</div>
    </div>

    <script>
      const statusText = document.getElementById("status");

      setTimeout(() => {
        statusText.innerText = "VERIFYING CARD...";
      }, 2000);

      setTimeout(() => {
        statusText.innerText = "PAYMENT SUCCESSFUL";
        document.getElementById("scanner").innerHTML = "✅";
      }, 3500);

      setTimeout(() => {
        statusText.innerText = "OPENING GATE...";
        document.getElementById("leftDoor").classList.add("open-left");
        document.getElementById("rightDoor").classList.add("open-right");
      }, 5000);

      setTimeout(() => {
        document.getElementById("success").classList.add("show");
      }, 6000);
    </script>
  </body>
</html>
