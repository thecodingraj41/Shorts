<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arc Reactor</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle,#081018,#000);
            overflow: hidden;
            color: white;
        }
        .container{
            text-align: center;
        }
        .reactor{
            width: 260px;
            height: 260px;
            border: 8px solid #00e5ff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: auto;
            position: relative;
            box-shadow: 0 0 30px #00e5ff,0 0 80px rgba(0,229,255,0.5);
            animation: spin 8s linear infinite;

        }
        .reactor::before{
            content: "";
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #00e5ff;
            box-shadow: 0 0 30px #00e5ff,0 0 100px #00e5ff;
        }
        @keyframes spin{
            from{
                transform: rotate(0deg);
            }
            to{
                transform: rotate(360deg);
            }
        }
        .percent{
            position: absolute;
            font-size: 42px;
            font-weight: bold;
        }
        .status{
            margin-top: 35px;
            font-size: 24px;
            color: #00e5ff;
            letter-spacing: 3px;
        }
        .bar{
            width: 320px;
            height: 10px;
            background: #111;
            border-radius: 20px;
            margin-top: 25px;
            overflow: hidden;
        }
        .fill{
            width: 0%;
            height: 100%;
            background: #00e5ff;
            box-shadow: 0 0 20px #00e5ff;
            transition: 0.5s;
        }
        .success{
            margin-top: 30px;
            font-size: 32px;
            color: #00ff88;
            opacity: 0;
            transition: 1s;
        }
        .show{
            opacity: 1;
        }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="reactor">
        <div class="percent" id="percent">0%</div>
      </div>

      <div class="status" id="status">CORE INITIALIZING...</div>

      <div class="bar">
        <div class="fill" id="fill"></div>
      </div>

      <div class="success" id="success">REACTOR STABLE ⚡</div>
    </div>

    <script>
      let value = 0;

      const percent = document.getElementById("percent");
      const fill = document.getElementById("fill");
      const status = document.getElementById("status");

      const timer = setInterval(() => {
        value += 5;

        percent.innerText = value + "%";
        fill.style.width = value + "%";

        if (value === 25) {
          status.innerText = "ENERGY CELLS ONLINE";
        }

        if (value === 50) {
          status.innerText = "POWER STABILIZING";
        }

        if (value === 75) {
          status.innerText = "FINAL CALIBRATION";
        }

        if (value >= 100) {
          clearInterval(timer);

          status.innerText = "ENERGY OUTPUT STABLE";

          document.getElementById("success").classList.add("show");
        }
      }, 150);
    </script>
  </body>
</html>
