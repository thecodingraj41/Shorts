<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car Track</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        body{
            height: 100vh;
            background: #090909;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container{
            text-align: center;
        }
        .timer{
            font-size: 70px;
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88;
            margin-bottom: 30px;
        }
        .track{
            width: 800px;
            height: 220px;
            background: #1a1a1a;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            border: 2px solid #333;
        }
        .track::before{
            content: "";
            position: absolute;
            top: 50%;
            width: 100%;
            height: 5px;
            background: repeating-linear-gradient(to right,white 0 30px, transparent 30px 60px );
        }
        .car{
            position: absolute;
            left: -220px;
            top: 75px;
            font-size: 70px;
            transition: 2s;
        }
        .stop{
            left: 320px;
        }
        .leave{
            left: 900px;
        }
        .status{
            margin-top: 30px;
            font-size: 28px;
            letter-spacing: 2px;
            color: #aaa;
        }
        .show{
            opacity: 1;
        }
        .crew{
            position: absolute;
            top: 40px;
            font-size: 45px;
            opacity: 1;
            transition: 0.5s;
        }
        .left{
            left: 250px;
        }
        .right{
            right: 25px;
        }
        .signal{
            font-size: 60px;
            margin-top: 20px;
            opacity: 0;
            transition: 1s;
        }
        .green{
            opacity: 1;
        }

    </style>
  </head>
  <body>
    <div class="container">
      <div class="timer" id="timer">0.0s</div>

      <div class="track">
        <div class="car" id="car">🏎️</div>

        <div class="crew left" id="crew1">🔧</div>

        <div class="crew right" id="crew2">🔧</div>
      </div>

      <div class="status" id="status">CAR ENTERING PIT LANE...</div>

      <div class="signal" id="signal">🟢 GO GO GO</div>
    </div>

    <script>
      const car = document.getElementById("car");
      const statusText = document.getElementById("status");
      const timer = document.getElementById("timer");

      let time = 0.0;

      setTimeout(() => {
        car.classList.add("stop");
      }, 500);

      setTimeout(() => {
        statusText.innerText = "CHANGING TYRES...";
        crew1.classList.add("show");
        crew2.classList.add("show");

        const interval = setInterval(() => {
          time += 0.1;
          timer.innerText = time.toFixed(1) + "s";

          if (time >= 2.3) {
            clearInterval(interval);

            statusText.innerText = "PIT STOP COMPLETE";

            signal.classList.add("green");

            setTimeout(() => {
              car.classList.add("leave");
              statusText.innerText = "BACK TO THE RACE!";
            }, 1000);
          }
        }, 100);
      }, 2500);
    </script>
  </body>
</html>
