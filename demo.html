<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: black;
            overflow: hidden;
        }
        .container{
            position: relative;
            width: 300px;
            height: 420px;
        }
        .left,.right{
            position: absolute;
            width: 70px;
            height: 100%;
            background: #e50914;
            box-shadow: 0 0 30px rgba(229,9,20,0.7);
        }
        .left{
            left: 0;
        }
        .right{
            right: 0;
        }
        .middle{
            position: absolute;
            left: 50%;
            width: 70px;
            height: 100%;
            background: #b20710;
            transform: translateX(-50%)skew(22deg);
            transform-origin: center;
            animation: middle 2s ease forwards;
        }
        @keyframes middle{
            from{
                height: 0;
                top: 100%;
            }
            to{
                height: 100%;
                top: 0;
            }
        }
        .streak{
            position: absolute;
            top: 0;
            left: -200px;
            width: 150px;
            height: 100%;
            background: linear-gradient(90deg,transparent,rgba(255,255,255,0.8),transparent);
            transform: skewX(-20deg);
            animation: streak 2.5s linear infinite;
        }
        @keyframes streak{
            from{
                left: -250px;
            }
            to{
                left: 500px;
            }
        }
        .logo{
            text-align: center;
            color: white;
            font-size: 50px;
            letter-spacing: 10px;
            bottom: -90px;
            left: 15px;
            position: absolute;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left"></div>
        <div class="middle"></div>
        <div class="right"></div>
        <div class="streak"></div>
        <div class="logo">NETFLIX</div>
    </div>
</body>
</html>
