<!doctype html>
<html>
  <head>
    <title>Delivery Tracker</title>
    <style>
      *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }
      body{
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #0f1111;
        color: white;
      }
      .card{
        width: 380px;
        padding: 30px;
        border-radius: 25px;
        background: #161b22;
        box-shadow: 0 0 40px rgba(255,153,0,0.3);
      }
      .logo{
        text-align: center;
        font-size: 28px;
        color: #ff9900;
        font-family: bold;
      }
      .package{
        font-size: 60px;
        text-align: center;
        margin: 25px 0;
        animation: move 2s infinite alternate;
      }
      @keyframes move {
        from{
          transform: translateY(-25px);
        }
        to{
          transform: translateX(25px);
        }
      }
      .timeline{
        margin-top: 20px;
        position: relative;
      }
      .line{
        position: absolute;
        left: 12px;
        top: 0;
        width: 4px;
        height: 100%;
        background: #333;
      }
      .step{
        position: relative;
        display: flex;
        align-items: center;
        margin: 35px 0;
      }
      .circle{
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: #333;
        z-index: 2;
        transition: 0.5s;
      }
      .text{
        margin-left: 15px;
        color: #888;
        transition: 0.5s;
      }
      .active .circle{
        background: #ff9900;
        box-shadow: 0 0 20px #ff9900;
      }
      .active .text{
        color: white;
      }
      .truck{
        text-align: center;
        font-size: 50px;
        opacity: 0;
        transform: translateY(20px);
        transition: 1s;
      }
      .show{
        opacity: 1;
        transform: translateY(0);
      }
      
    </style>

  </head>

  <body>
    <div class="card">
      <div class="logo">amazon</div>

      <div class="package">📦</div>

      <div class="timeline">
        <div class="line"></div>

        <div class="step">
          <div class="circle"></div>
          <div class="text">Order Placed</div>
        </div>

        <div class="step">
          <div class="circle"></div>
          <div class="text">Package Shipped</div>
        </div>

        <div class="step">
          <div class="circle"></div>
          <div class="text">Out For Delivery</div>
        </div>

        <div class="step">
          <div class="circle"></div>
          <div class="text">Delivered</div>
        </div>
      </div>

      <div class="truck">🚚</div>
    </div>

    <script>
      const steps = document.querySelectorAll(".step");

      let index = 0;

      const timer = setInterval(() => {
        steps[index].classList.add("active");

        index++;

        if (index === steps.length) {
          clearInterval(timer);

          setTimeout(() => {
            document.querySelector(".truck").classList.add("show");
          }, 700);
        }
      }, 1200);
    </script>
  </body>
</html>
