<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            height: 100vh;
            background: black;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-family: sans-serif;
        }
        .loader{
            position: relative;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.8);
        }
        .ring{
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border-top: 4px solid cyan;
            animation: spin 2s linear infinite;
        }
        .ring:nth-child(2){
            inset: 20px;
            animation-duration: 3s;

        }
        .ring:nth-child(3){
            inset: 40px;
            animation-duration: 4s;
        }
        h1{
            margin-top: 50px;
            letter-spacing: 8px;
        }
        @keyframes spin{
            from{
                transform: rotate(0deg);
            }
            to{
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
    </div>
    <h1>INITIALIZING</h1>
</body>
</html>
