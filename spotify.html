<!doctype html>
<html>
  <head>
    <title>Spotify Player UI</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
        }
        .card{
            width: 340px;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            color: white;
            background: rgba(255,255,255,0.08);
        }
        .album{
            width: 180px;
            height: 180px;
            margin: auto;
            border-radius: 50%;
            background: linear-gradient(45deg,#1db954,#0a7d36)
            ;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 55px;
            animation: spin 5s linear infinite;
            box-shadow: 0 0 30px #1db954;
        }
        @keyframes spin{
            from{
                transform: rotate(0deg);
            }
            to{
                transform: rotate(360deg);
            }
        }
        .song{
            margin-top: 25px;
            font-size: 24px;
            font-weight: bold;
        }
        .artist{
            color: #ddd;
            margin-top: 8px;
        }
        .progress{
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            margin: 25px 0;
            overflow: hidden;
        }
        .fill{
            width: 0%;
            height: 100%;
            background: #1db954;
            animation: music 8s linear infinite;
        }
        @keyframes music{
            from{
                width: 0%;
            }
            to{width: 100%;}
        }
        .controls{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
        }
        .btn{
            color: white;
            font-size: 28px;
            cursor: pointer;
        }
        .play{
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: #1db954;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 0 0 25px #1db954;
            animation: pulse 1.5s infinite;

        }
        @keyframes pulse{
            50%{
                transform: scale(1.15);
            }
        }
        .equalizer{
            margin-top: 30px;
            display: flex;
            justify-content: center;
            align-items: end;
            gap: 6px;
            height: 60px;
        }
        .bar{
            width: 8px;
            background: #1db954;
            border-radius: 10px;
            animation: wave 1s infinite;
        }
        .bar:nth-child(2){
            animation-delay: 0.2s;
        }
        .bar:nth-child(3){
            animation-delay: 0.4s;
        }
        .bar:nth-child(4){
            animation-delay: 0.6s;
        }
        .bar:nth-child(5){
            animation-delay: 0.8s;
        }
        @keyframes wave{
            0%,100%{
                height: 15px;
            }
            50%{
                height: 55px;
            }
        }

    </style>
  </head>

  <body>
    <div class="card">
      <div class="album">🎵</div>

      <div class="song">Night Drive</div>

      <div class="artist">Synth Wave</div>

      <div class="progress">
        <div class="fill"></div>
      </div>

      <div class="controls">
        <div class="btn">⏮</div>

        <div class="play">▶</div>

        <div class="btn">⏭</div>
      </div>

      <div class="equalizer">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
    </div>
  </body>
</html>
